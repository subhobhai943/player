# Google Cloud Build trigger config
# Place this file at the repo ROOT (not inside server/)
# This auto-deploys the backend to Cloud Run on every push to main

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/player/player-server:$COMMIT_SHA'
      - './server'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/player/player-server:$COMMIT_SHA'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'player-server'
      - '--image'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/player/player-server:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/player/player-server:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
